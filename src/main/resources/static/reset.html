<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Reset Password - Fabrication Panel</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #f3f7ff;
            margin: 0;
        }
        .topbar {
            background: #2563eb;
            color: #fff;
            padding: 14px 24px;
            font-size: 18px;
            font-weight: 600;
        }
        .wrap {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 48px 16px;
        }
        .card {
            background: #ffffff;
            padding: 32px 32px 28px;
            border-radius: 10px;
            box-shadow: 0 18px 45px rgba(15,23,42,0.08);
            width: 100%;
            max-width: 440px;
        }
        h1 {
            font-size: 22px;
            margin: 0 0 4px;
        }
        .subtitle {
            font-size: 13px;
            color: #6b7280;
            margin-bottom: 24px;
        }
        label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 4px;
        }
        input {
            width: 100%;
            padding: 9px 10px;
            font-size: 14px;
            border-radius: 6px;
            border: 1px solid #d1d5db;
            box-sizing: border-box;
            outline: none;
        }
        input:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 1px rgba(37,99,235,0.15);
        }
        .field {
            margin-bottom: 14px;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 9px 16px;
            border-radius: 7px;
            border: none;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            background: #2563eb;
            color: #fff;
            width: 100%;
            margin-top: 4px;
        }
        .btn:disabled {
            opacity: .6;
            cursor: default;
        }
        .msg {
            margin-top: 12px;
            font-size: 13px;
        }
        .msg.err {
            color: #b91c1c;
        }
        .msg.ok {
            color: #15803d;
        }
        .back {
            margin-top: 14px;
            font-size: 13px;
        }
        .back a {
            color: #2563eb;
            text-decoration: none;
        }
        .back a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
<div class="topbar">
    Fabrication Panel
</div>

<div class="wrap">
    <div class="card">
        <h1>Reset password</h1>
        <div class="subtitle">
            Use este formulário para redefinir a senha de um usuário já existente.
        </div>

        <form id="form">
            <div class="field">
                <label for="user">Username</label>
                <input id="user" type="text" autocomplete="username" required />
            </div>

            <div class="field">
                <label for="pass">New password</label>
                <input id="pass" type="password" autocomplete="new-password" required />
            </div>

            <button type="submit" class="btn" id="btnReset">Reset password</button>
        </form>

        <div id="msg" class="msg"></div>

        <div class="back">
            ← <a href="login.html">Back to login</a>
        </div>
    </div>
</div>

<script>
    const form = document.getElementById('form');
    const user = document.getElementById('user');
    const pass = document.getElementById('pass');
    const msg  = document.getElementById('msg');
    const btn  = document.getElementById('btnReset');

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        msg.textContent = '';
        msg.className = 'msg';
        btn.disabled = true;

        try {
            const res = await fetch('/api/auth/reset', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    username: user.value.trim(),
                    password: pass.value
                })
            });

            const data = await res.json().catch(() => ({}));

            if (!res.ok || !data) {
                msg.textContent = data && data.message
                    ? data.message
                    : 'Erro ao resetar senha.';
                msg.className = 'msg err';
                return;
            }

            if (data.status === 'not_found') {
                msg.textContent = 'Usuário não encontrado.';
                msg.className = 'msg err';
                return;
            }

            if (data.status !== 'reset') {
                msg.textContent = data.message || 'Erro ao resetar senha.';
                msg.className = 'msg err';
                return;
            }

            msg.textContent = 'Senha atualizada com sucesso!';
            msg.className = 'msg ok';
            pass.value = '';
        } catch (err) {
            msg.textContent = 'Erro de rede: ' + err;
            msg.className = 'msg err';
        } finally {
            btn.disabled = false;
        }
    });
</script>
</body>
</html>
