<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Login - Fabrication Panel</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #f3f7ff;
            margin: 0;
        }
        .topbar {
            background: #2563eb;
            color: #fff;
            padding: 14px 24px;
            font-size: 18px;
            font-weight: 600;
        }
        .container {
            max-width: 420px;
            margin: 60px auto;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(15,23,42,0.12);
            padding: 24px 26px 28px;
        }
        h1 {
            margin: 0 0 6px;
            font-size: 20px;
        }
        .subtitle {
            margin: 0 0 18px;
            font-size: 13px;
            color: #6b7280;
        }
        .field {
            margin-bottom: 14px;
        }
        label {
            display: block;
            margin-bottom: 4px;
            font-size: 13px;
            color: #374151;
        }
        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 8px 10px;
            border-radius: 8px;
            border: 1px solid #d1d5db;
            font-size: 14px;
        }
        input:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 1px rgba(37,99,235,0.35);
        }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 9px 16px;
            border-radius: 7px;
            border: none;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
        }
        .btn-primary {
            background: #2563eb;
            color: #fff;
            width: 100%;
        }
        .btn-primary:disabled {
            opacity: .6;
            cursor: default;
        }
        .links {
            margin-top: 12px;
            font-size: 13px;
            display: flex;
            justify-content: space-between;
        }
        .links a {
            color: #2563eb;
            text-decoration: none;
        }
        .links a:hover {
            text-decoration: underline;
        }
        .msg {
            margin-top: 10px;
            font-size: 13px;
        }
        .msg.err {
            color: #b91c1c;
        }
        .msg.ok {
            color: #15803d;
        }
    </style>
</head>
<body>
<div class="topbar">
    Fabrication Panel – Login
</div>

<div class="container">
    <h1>Sign in</h1>
    <p class="subtitle">Use your seller or admin account to access the panel.</p>

    <form id="form">
        <div class="field">
            <label for="user">Username</label>
            <input id="user" type="text" autocomplete="username" required />
        </div>
        <div class="field">
            <label for="pass">Password</label>
            <input id="pass" type="password" autocomplete="current-password" required />
        </div>
        <button id="btnLogin" class="btn btn-primary" type="submit">Login</button>
        <div id="msg" class="msg"></div>
    </form>

    <div class="links">
        <a href="/register.html">Create seller</a>
        <a href="/reset.html">Reset password</a>
    </div>
</div>

<script>
    const form = document.getElementById('form');
    const user = document.getElementById('user');
    const pass = document.getElementById('pass');
    const msg  = document.getElementById('msg');
    const btn  = document.getElementById('btnLogin');

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        msg.textContent = '';
        msg.className = 'msg';
        btn.disabled = true;

        try {
            const res = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    username: user.value.trim(),
                    password: pass.value
                })
            });

            const data = await res.json().catch(() => ({}));

            if (!res.ok || !data || data.status !== 'ok') {
                msg.textContent = data && data.message ? data.message : 'Invalid username or password.';
                msg.className = 'msg err';
                return;
            }

            // LOGIN OK -> guardar username e seguir para o painel
            const username = user.value.trim();
            if (username) {
                localStorage.setItem('username', username);
            }

            window.location.href = '/index.html';
        } catch (err) {
            msg.textContent = 'Network error: ' + err;
            msg.className = 'msg err';
        } finally {
            btn.disabled = false;
        }
    });
</script>
</body>
</html>
